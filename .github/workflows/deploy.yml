name: Deploy static site to GitHub Pages

# main 브랜치에 push될 때마다(예: index.html 수정 후) 자동 배포. 수동 실행도 가능.
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않도록(진행 중이면 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # 성공한 시도의 URL 사용(재시도 대비 coalesce)
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (저장소 루트 전체 = 정적 사이트)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # Deploy 스텝은 간헐적으로 실패할 수 있어 최대 3회 시도(원 1 + 재시도 2, 간격 대기).
      - name: Deploy to GitHub Pages
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (retry 1)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      # 마지막 시도는 continue-on-error 없음 → 3회 모두 실패 시에만 잡 실패로 표시
      - name: Deploy to GitHub Pages (retry 2)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
